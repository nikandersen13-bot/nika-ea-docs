name: Fetch PDF files
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install playwright
        run: pip install playwright && playwright install chromium
      - name: Download PDF files via browser
        run: |
          python3 << 'PYEOF'
          import asyncio
          from playwright.async_api import async_playwright
          
          async def main():
              files = [
                  ('https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/52772277/ab74b57a-fd68-429f-9d1e-82073186990c/Nika_EA_V127_Comprehensive_Analysis-2-5.pdf', 'Nika_EA_V127_Comprehensive_Analysis.pdf'),
                  ('https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/52772277/45c84474-d237-4eab-85da-595225804a6c/Nika_EA_V127_Quick_Reference-2-4.pdf', 'Nika_EA_V127_Quick_Reference.pdf'),
                  ('https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/52772277/68fac5bc-234d-4e8e-805b-753a9e1090bf/Nika-EA-V1.28-Professional-Assessment-2.pdf', 'Nika-EA-V1.28-Professional-Assessment.pdf'),
              ]
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  context = await browser.new_context()
                  for url, name in files:
                      print(f'Downloading {name}...')
                      page = await context.new_page()
                      resp = await page.request.get(url)
                      body = await resp.body()
                      with open(name, 'wb') as f:
                          f.write(body)
                      print(f'Downloaded {name} ({len(body)} bytes)')
                      await page.close()
                  await browser.close()
          
          asyncio.run(main())
          PYEOF
      - name: Verify downloads
        run: |
          ls -la *.pdf
          file *.pdf
      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.pdf
          git commit -m "Add PDF documentation files" || echo "No changes"
          git push
