name: Fetch PDF files
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download PDF files
        run: |
          curl -fL -o Nika_EA_V127_Comprehensive_Analysis.pdf "https://drive.google.com/uc?export=download&id=1Takd2SmrU39TvrthlMuv-ZehySe0p0vk"
          curl -fL -o Nika_EA_V127_Quick_Reference.pdf "https://drive.google.com/uc?export=download&id=1LuP6k_16n3k70P550P9-1Lu86amIVFr3"
          curl -fL -o Nika-EA-V1.28-Professional-Assessment.pdf "https://drive.google.com/uc?export=download&id=1-YpfjMPqs8I1zhok8LEP8URtdPOC6V6HN"
      - name: Verify downloads
        run: |
          ls -la *.pdf
          file *.pdf
      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.pdf
          git commit -m "Add PDF documentation files" || echo "No changes"
          git push
