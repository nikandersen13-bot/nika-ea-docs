name: Fetch PDF files
on:
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download PDF files
        run: |
          curl -L -o Nika_EA_V127_Comprehensive_Analysis.pdf "https://drive.google.com/uc?export=download&id=1TzWdzSmrUJ9TvrtWiWuv-ZehySe0pBvk"
          curl -L -o Nika_EA_V127_Quick_Reference.pdf "https://drive.google.com/uc?export=download&id=1LuP6k_1Gn3k7DP5SOP9-lLuB6am1VFr3"
          curl -L -o Nika-EA-V1.28-Professional-Assessment.pdf "https://drive.google.com/uc?export=download&id=1-YpEjmPqs8izhoW8LEPBUNidPOC6VGMH"
      - name: Verify downloads
        run: |
          ls -la *.pdf
          file *.pdf
      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.pdf
          git commit -m "Add PDF documentation files" || echo "No changes"
          git push
